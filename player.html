<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            background: #000;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <video 
        id="myVideo"
        autoplay 
        muted 
        playsinline
        webkit-playsinline
        preload="auto"
        src="https://samplelib.com/mp4/sample-5s-360p.mp4">
    </video>

    <script>
        var video = document.getElementById('myVideo');
        
        // When video ends, redirect to Blogspot
        video.addEventListener('ended', function() {
            window.top.location.href = 'https://alisoft24.blogspot.com/2026/06/blog-post.html';
        });

        // Try to autoplay
        video.play().catch(function(error) {
            console.log('Autoplay blocked:', error);
        });
    </script>
</body>
</html>
